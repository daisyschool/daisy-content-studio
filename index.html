<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Daisy Content Studio — Team</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal:#1D9E75; --teal-dark:#0F6E56; --teal-light:#E8F7F2;
      --gold:#E8A800; --gold-light:#FFF8E1;
      --purple:#534AB7; --blue:#185FA5;
      --orange:#D85A30; --orange-light:#FFF0EB;
      --red:#C62828; --red-light:#FFF0F0;
      --bg:#F5F8F6; --surface:#FFFFFF;
      --border:#DDE8E4; --border-light:#EEF4F1;
      --text:#1A2E26; --text-2:#4A6358; --text-3:#8FA89F;
      --ki:#0F6E56; --ki-bg:#E8F7F2; --ki-border:#9ED6C0;
      --daisy:#185FA5; --daisy-bg:#EEF4FB; --daisy-border:#9FC3E8;
    }
    body { font-family:'Inter',-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; max-width:680px; margin:0 auto; }

    /* ── Header ── */
    header {
      background:var(--teal-dark); color:white;
      padding:16px 20px 12px; position:sticky; top:0; z-index:100;
      box-shadow:0 2px 12px rgba(15,110,86,0.25);
    }
    .header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .header-brand { display:flex; align-items:center; gap:10px; }
    .logo { width:28px; height:28px; }
    .header-title { font-size:1rem; font-weight:800; letter-spacing:-0.02em; }
    .header-sub { font-size:0.68rem; opacity:0.6; margin-top:1px; }
    .week-banner { background:rgba(255,255,255,0.12); border-radius:8px; padding:7px 12px; font-size:0.78rem; display:flex; justify-content:space-between; align-items:center; }
    .week-theme { font-weight:700; }
    .week-date { opacity:0.7; font-size:0.7rem; }

    /* ── Bottom nav ── */
    nav {
      position:fixed; bottom:0; left:50%; transform:translateX(-50%);
      width:100%; max-width:680px;
      background:var(--surface); border-top:1px solid var(--border);
      display:flex; z-index:100;
      box-shadow:0 -2px 12px rgba(0,0,0,0.08);
    }
    .nav-btn {
      flex:1; padding:10px 6px 12px; text-align:center;
      font-size:0.7rem; font-weight:600; color:var(--text-3);
      cursor:pointer; border:none; background:none; font-family:inherit;
      transition:color 0.15s;
    }
    .nav-btn .nav-icon { display:block; font-size:1.3rem; margin-bottom:2px; line-height:1; }
    .nav-btn.active { color:var(--teal-dark); }
    .nav-btn.active .nav-dot { display:inline-block; width:4px; height:4px; background:var(--teal); border-radius:50%; vertical-align:middle; margin-left:3px; }

    /* ── Pages ── */
    .page { display:none; padding:16px 16px 90px; }
    .page.active { display:block; }

    /* ── Day strip (week view) ── */
    .day-strip { display:flex; gap:6px; overflow-x:auto; padding-bottom:4px; margin-bottom:16px; scrollbar-width:none; }
    .day-strip::-webkit-scrollbar { display:none; }
    .day-pill {
      flex-shrink:0; text-align:center; padding:8px 12px; border-radius:10px;
      background:var(--surface); border:1.5px solid var(--border);
      cursor:pointer; min-width:52px; transition:all 0.15s;
    }
    .day-pill.active { background:var(--teal-dark); border-color:var(--teal-dark); color:white; }
    .day-pill.today { border-color:var(--teal); }
    .day-pill-day { font-size:0.62rem; font-weight:700; text-transform:uppercase; opacity:0.6; }
    .day-pill.active .day-pill-day { opacity:0.75; color:white; }
    .day-pill-num { font-size:1.1rem; font-weight:800; line-height:1.1; }
    .day-pill-dot { display:flex; gap:3px; justify-content:center; margin-top:3px; }
    .dot { width:5px; height:5px; border-radius:50%; }
    .dot.ki { background:var(--ki); }
    .dot.daisy { background:var(--daisy); }
    .dot.empty { background:var(--border); }

    /* ── Section label ── */
    .section-label {
      font-size:0.65rem; font-weight:700; text-transform:uppercase;
      letter-spacing:0.07em; color:var(--text-3); margin-bottom:8px;
    }

    /* ── Brief card ── */
    .brief-card {
      background:var(--surface); border-radius:14px; overflow:hidden;
      box-shadow:0 2px 10px rgba(15,110,86,0.07);
      margin-bottom:14px; border:1px solid var(--border);
    }
    .brief-card.ki-card { border-color:var(--ki-border); }
    .brief-card.daisy-card { border-color:var(--daisy-border); }
    .brief-card.empty-card { opacity:0.5; border-style:dashed; }

    .card-header {
      padding:12px 16px 10px;
      display:flex; align-items:flex-start; justify-content:space-between; gap:10px;
    }
    .card-header.ki   { background:var(--ki-bg); }
    .card-header.daisy { background:var(--daisy-bg); }

    .brand-badge {
      display:inline-flex; align-items:center; gap:5px;
      font-size:0.65rem; font-weight:800; text-transform:uppercase; letter-spacing:0.05em;
      padding:3px 8px; border-radius:6px; flex-shrink:0;
    }
    .brand-badge.ki   { background:var(--ki);   color:white; }
    .brand-badge.daisy { background:var(--daisy); color:white; }

    .card-format-chips { display:flex; gap:4px; flex-wrap:wrap; }
    .fmt-chip {
      font-size:0.62rem; font-weight:600; padding:2px 7px; border-radius:5px;
      white-space:nowrap;
    }
    .fmt-chip.video    { background:#F0EEFF; color:var(--purple); }
    .fmt-chip.carousel { background:#FFF8E1; color:#9A6F00; }
    .fmt-chip.article  { background:var(--teal-light); color:var(--teal-dark); }
    .fmt-chip.tiktok   { background:#F0EEFF; color:var(--purple); }
    .fmt-chip.instagram { background:#FFF0F8; color:#C2185B; }
    .fmt-chip.red      { background:#FFF0F0; color:var(--red); }
    .fmt-chip.facebook { background:#EEF4FB; color:var(--blue); }
    .fmt-chip.yt       { background:#FFF3E0; color:#E65100; }
    .fmt-chip.web      { background:var(--teal-light); color:var(--teal-dark); }

    .card-concept {
      padding:12px 16px 8px;
      font-size:1rem; font-weight:700; line-height:1.35;
      color:var(--text);
    }
    .card-hook {
      padding:0 16px 12px;
      font-size:0.82rem; color:var(--text-2); line-height:1.4;
      font-style:italic;
    }
    .card-hook::before { content:'💬 Hook: '; font-weight:700; font-style:normal; color:var(--teal-dark); }

    /* ── Card tabs ── */
    .card-tabs { display:flex; border-top:1px solid var(--border-light); border-bottom:1px solid var(--border-light); }
    .card-tab {
      flex:1; padding:9px; text-align:center; font-size:0.75rem; font-weight:600;
      color:var(--text-3); cursor:pointer; border:none; background:none;
      font-family:inherit; transition:all 0.15s; border-bottom:2px solid transparent;
    }
    .card-tab.active { color:var(--teal-dark); border-bottom-color:var(--teal); background:var(--teal-light); }

    /* ── Card body ── */
    .card-body { padding:14px 16px; }
    .card-panel { display:none; }
    .card-panel.active { display:block; }

    /* ── Shoot body elements ── */
    .beats-table { width:100%; border-collapse:collapse; font-size:0.77rem; margin-bottom:14px; }
    .beats-table th { text-align:left; padding:6px 8px; font-size:0.62rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-3); border-bottom:1px solid var(--border); }
    .beats-table td { padding:7px 8px; border-bottom:1px solid var(--border-light); vertical-align:top; }
    .beats-table tr:last-child td { border-bottom:none; }
    .beat-time { white-space:nowrap; color:var(--text-3); font-size:0.7rem; font-weight:600; }
    .beat-text { font-weight:700; color:var(--text); }
    .beat-visual { color:var(--text-2); font-size:0.73rem; }

    .subsection-label { font-size:0.65rem; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-3); margin-bottom:7px; margin-top:14px; }
    .subsection-label:first-child { margin-top:0; }

    .checklist { list-style:none; display:flex; flex-direction:column; gap:5px; margin-bottom:10px; }
    .checklist li { display:flex; gap:8px; align-items:flex-start; font-size:0.8rem; line-height:1.4; color:var(--text-2); }
    .checklist li::before { content:'□'; font-size:1rem; line-height:1.1; flex-shrink:0; color:var(--text-3); }
    .checklist li.note::before { content:'⚡'; font-size:0.75rem; }
    .checklist li.warning::before { content:'🚫'; font-size:0.75rem; }

    .music-box { background:var(--gold-light); border:1px solid var(--gold); border-radius:8px; padding:9px 12px; font-size:0.77rem; color:var(--text-2); margin-top:10px; }
    .music-box::before { content:'🎵 '; }

    /* ── Post body elements ── */
    .platform-caption { margin-bottom:12px; }
    .platform-label { display:flex; align-items:center; justify-content:space-between; margin-bottom:5px; }
    .platform-name { font-size:0.67rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-3); }
    .copy-btn {
      font-size:0.67rem; font-weight:700; color:var(--teal-dark);
      background:var(--teal-light); border:1px solid var(--teal);
      border-radius:5px; padding:3px 9px; cursor:pointer; font-family:inherit;
      transition:all 0.15s; flex-shrink:0;
    }
    .copy-btn:active { background:var(--teal); color:white; }
    .copy-btn.copied { background:var(--teal); color:white; }
    .caption-box {
      background:var(--bg); border:1px solid var(--border); border-radius:8px;
      padding:10px 12px; font-size:0.8rem; line-height:1.55; color:var(--text-2);
      white-space:pre-wrap; word-break:break-word;
    }

    /* ── Empty brief card ── */
    .empty-brief {
      padding:20px 16px; text-align:center;
      font-size:0.82rem; color:var(--text-3); line-height:1.5;
    }
    .empty-brief .empty-icon { font-size:2rem; margin-bottom:8px; display:block; }

    /* ── Brand guide ── */
    .brand-guide-section { margin-bottom:24px; }
    .brand-guide-header {
      border-radius:12px 12px 0 0; padding:14px 16px;
      font-size:1rem; font-weight:800; color:white;
    }
    .brand-guide-header.ki { background:var(--ki); }
    .brand-guide-header.daisy { background:var(--daisy); }
    .brand-guide-body { background:var(--surface); border:1px solid var(--border); border-top:none; border-radius:0 0 12px 12px; padding:16px; }
    .brand-guide-body + .brand-guide-body { border-top:none; }

    .rule-block { margin-bottom:14px; }
    .rule-label { font-size:0.65rem; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-3); margin-bottom:5px; }
    .rule-text { font-size:0.82rem; color:var(--text-2); line-height:1.5; }

    .do-dont { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
    .do-col { background:#E8F7F2; border-radius:8px; padding:10px; }
    .dont-col { background:#FFF0F0; border-radius:8px; padding:10px; }
    .do-col .col-label { font-size:0.65rem; font-weight:800; color:var(--teal-dark); margin-bottom:5px; }
    .dont-col .col-label { font-size:0.65rem; font-weight:800; color:var(--red); margin-bottom:5px; }
    .do-col ul, .dont-col ul { list-style:none; display:flex; flex-direction:column; gap:4px; }
    .do-col li, .dont-col li { font-size:0.75rem; line-height:1.4; color:var(--text-2); }
    .do-col li::before { content:'✓ '; color:var(--teal-dark); font-weight:700; }
    .dont-col li::before { content:'✗ '; color:var(--red); font-weight:700; }

    .platform-row { display:flex; gap:5px; flex-wrap:wrap; margin-top:5px; }
    .pt-tag { font-size:0.7rem; font-weight:700; padding:3px 8px; border-radius:6px; }
    .pt-tag.tiktok { background:#F0EEFF; color:var(--purple); }
    .pt-tag.ig { background:#FFF0F8; color:#C2185B; }
    .pt-tag.yt { background:#FFF3E0; color:#E65100; }
    .pt-tag.red { background:#FFF0F0; color:var(--red); }
    .pt-tag.fb { background:#EEF4FB; color:var(--blue); }
    .pt-tag.web { background:var(--teal-light); color:var(--teal-dark); }

    .workflow-steps { display:flex; flex-direction:column; gap:8px; margin-top:10px; }
    .wf-step { display:flex; gap:10px; align-items:flex-start; font-size:0.8rem; color:var(--text-2); line-height:1.4; }
    .wf-num { width:24px; height:24px; border-radius:50%; background:var(--teal-dark); color:white; display:flex; align-items:center; justify-content:center; font-size:0.68rem; font-weight:800; flex-shrink:0; }

    .approval-box { background:var(--orange-light); border:1px solid var(--orange); border-radius:8px; padding:11px 14px; font-size:0.8rem; color:var(--text-2); line-height:1.5; margin-top:14px; }
    .approval-box strong { color:var(--orange); }

    footer { height:10px; }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-brand">
      <svg class="logo" viewBox="0 0 36 36" fill="none">
        <circle cx="18" cy="18" r="18" fill="rgba(255,255,255,0.12)"/>
        <circle cx="18" cy="18" r="5" fill="#E8A800"/>

      <div>
        <div class="header-title">Content Studio</div>
        <div class="header-sub" id="headerSub">Team Brief</div>

  <div class="week-banner" id="weekBanner">
    <span class="week-theme" id="weekTheme">Summer Camp 🌊</span>
    <span class="week-date" id="weekDateRange">22–26 Jun 2026</span>

</header>

<!-- PAGES -->
<div class="page active" id="page-today"></div>
<div class="page" id="page-week"></div>
<div class="page" id="page-guide"></div>

<!-- BOTTOM NAV -->
<nav>
  <button class="nav-btn active" onclick="showPage('today',this)">
    <span class="nav-icon">📋</span>Today
  </button>
  <button class="nav-btn" onclick="showPage('week',this)">
    <span class="nav-icon">📅</span>Week
  </button>
  <button class="nav-btn" onclick="showPage('guide',this)">
    <span class="nav-icon">🎬</span>How to Shoot
  </button>
</nav>

<footer></footer>

const now = new Date();
const todayISO = now.toISOString().slice(0,10);

function getDayLabel(iso){
  const d = new Date(iso+'T00:00:00');
  return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
}
function getDayNum(iso){ return new Date(iso+'T00:00:00').getDate(); }
function getMonthStr(iso){
  const d = new Date(iso+'T00:00:00');
  return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
}

function ptLabel(pt){ return {tiktok:'TikTok',instagram:'IG',red:'RED',facebook:'FB','youtube-shorts':'YT',website:'Web'}[pt]||pt; }
function ptChipClass(pt){ return {tiktok:'tiktok',instagram:'ig',red:'red',facebook:'fb','youtube-shorts':'yt',website:'web'}[pt]||''; }
function fmtChipClass(fmt){ return {video:'video',carousel:'carousel','photo-carousel':'carousel',article:'article','short-video':'video'}[fmt]||'video'; }
function fmtLabel(fmt){ return {video:'📹 Video',carousel:'🖼 Carousel','photo-carousel':'🖼 Carousel',article:'📝 Article','short-video':'📹 Video'}[fmt]||fmt; }

function copyText(text, btn){
  navigator.clipboard.writeText(text).then(()=>{
    const orig = btn.textContent;
    btn.textContent = '✓ Copied';
    btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
  }).catch(()=>{
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✓ Copied'; btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

// ─── BRIEF CARD BUILDER ──────────────────────────────────────
function buildCard(brief){
  const isKi = brief.slot === 'ki';
  const cardId = brief.id;

  const card = document.createElement('div');
  card.className = `brief-card ${isKi?'ki-card':'daisy-card'}${brief.status==='idea'?' empty-card':''}`;

  // Header
  const hdr = document.createElement('div');
  hdr.className = `card-header ${isKi?'ki':'daisy'}`;

  const leftCol = document.createElement('div');
  const badge = document.createElement('span');
  badge.className = `brand-badge ${isKi?'ki':'daisy'}`;
  badge.textContent = isKi ? '🌿 คุณครูอิ๊ฟ' : '🌼 Daisy';
  leftCol.appendChild(badge);

  const rightCol = document.createElement('div');
  rightCol.className = 'card-format-chips';
  const fmtChip = document.createElement('span');
  fmtChip.className = `fmt-chip ${fmtChipClass(brief.format)}`;
  fmtChip.textContent = fmtLabel(brief.format);
  rightCol.appendChild(fmtChip);
  (brief.platforms||[]).forEach(pt=>{
    const c = document.createElement('span');
    c.className = `fmt-chip ${ptChipClass(pt)}`;
    c.textContent = ptLabel(pt);
    rightCol.appendChild(c);
  });

  hdr.appendChild(leftCol);
  hdr.appendChild(rightCol);
  card.appendChild(hdr);

  // Concept
  const concept = document.createElement('div');
  concept.className = 'card-concept';
  concept.textContent = brief.concept;
  card.appendChild(concept);

  // Hook
  if(brief.hook){
    const hook = document.createElement('div');
    hook.className = 'card-hook';
    hook.textContent = brief.hook;
    card.appendChild(hook);
  }

  // If idea — show placeholder
  if(brief.status === 'idea'){
    const empty = document.createElement('div');
    empty.className = 'empty-brief';
    empty.innerHTML = `<span class="empty-icon">📝</span>Brief not ready yet.<br><small>Concept approved — full shoot brief coming soon.</small>`;
    card.appendChild(empty);
    return card;
  }

  // Tabs
  const tabs = document.createElement('div');
  tabs.className = 'card-tabs';
  const shootTabBtn = document.createElement('button');
  shootTabBtn.className = 'card-tab active';
  shootTabBtn.textContent = isKi ? '🎬 ถ่ายทำ' : '🎬 Shoot';
  const postTabBtn = document.createElement('button');
  postTabBtn.className = 'card-tab';
  postTabBtn.textContent = isKi ? '📤 โพสต์' : '📤 Post';
  tabs.appendChild(shootTabBtn);
  tabs.appendChild(postTabBtn);
  card.appendChild(tabs);

  // Body
  const body = document.createElement('div');
  body.className = 'card-body';

  // ── Shoot panel ──
  const shootPanel = document.createElement('div');
  shootPanel.className = 'card-panel active';

  // On-screen text beats (video)
  if(brief.beats && brief.beats.length){
    const lbl = document.createElement('div');
    lbl.className = 'subsection-label';
    lbl.textContent = isKi ? 'ข้อความบนหน้าจอ (On-screen text)' : 'On-screen text beats';
    shootPanel.appendChild(lbl);

    const tbl = document.createElement('table');
    tbl.className = 'beats-table';
    const thead = document.createElement('thead');
    thead.innerHTML = `<tr><th>${isKi?'เวลา':'Time'}</th><th>${isKi?'ข้อความ':'Text'}</th><th>${isKi?'ภาพ':'Visual'}</th></tr>`;
    tbl.appendChild(thead);
    const tbody = document.createElement('tbody');
    brief.beats.forEach(b=>{
      const tr = document.createElement('tr');
      tr.innerHTML = `<td class="beat-time">${b.time}</td><td class="beat-text">${b.text}</td><td class="beat-visual">${b.visual}</td>`;
      tbody.appendChild(tr);
    });

    shootPanel.appendChild(tbl);
  }

    const lbl = document.createElement('div');

      ul.appendChild(li);
    });
    shootPanel.appendChild(ul);
  }

  // Props

    const lbl = document.createElement('div');
    lbl.className = 'subsection-label';
    lbl.textContent = isKi ? 'อุปกรณ์ / การจัดฉาก' : 'Props & scene setup';
    shootPanel.appendChild(lbl);
    const ul = document.createElement('ul');
    ul.className = 'checklist';
    brief.props.forEach(p=>{
      const li = document.createElement('li');
      li.textContent = p;
      ul.appendChild(li);
    });
    shootPanel.appendChild(ul);
  }

  // Shoot notes
  if(brief.shoot_notes && brief.shoot_notes.length){
    const lbl = document.createElement('div');
    lbl.className = 'subsection-label';
    lbl.textContent = isKi ? 'โน้ตถ่ายทำ' : 'Shoot notes';
    shootPanel.appendChild(lbl);
    const ul = document.createElement('ul');
    ul.className = 'checklist';
    brief.shoot_notes.forEach(n=>{
      const li = document.createElement('li');
      li.className = 'note';
      li.textContent = n;
      ul.appendChild(li);
    });
    shootPanel.appendChild(ul);
  }

  // Warnings
  if(brief.warnings && brief.warnings.length){
    const ul = document.createElement('ul');
    ul.className = 'checklist';
    brief.warnings.forEach(w=>{
      const li = document.createElement('li');
      li.className = 'warning';
      li.textContent = w;
      ul.appendChild(li);
    });
    shootPanel.appendChild(ul);
  }

  // Music
  if(brief.music){
    const m = document.createElement('div');
    m.className = 'music-box';
    m.textContent = brief.music;
    shootPanel.appendChild(m);
  }

  body.appendChild(shootPanel);

  // ── Post panel ──
  const postPanel = document.createElement('div');
  postPanel.className = 'card-panel';

  const caps = brief.captions || {};
  const capKeys = Object.keys(caps);
  if(capKeys.length){
    capKeys.forEach(pt=>{
      const block = document.createElement('div');
      block.className = 'platform-caption';
      const plbl = document.createElement('div');
      plbl.className = 'platform-label';
      const pname = document.createElement('span');
      pname.className = 'platform-name';
      pname.textContent = ptLabel(pt);
      const copyBtn = document.createElement('button');
      copyBtn.className = 'copy-btn';
      copyBtn.textContent = 'Copy';
      copyBtn.onclick = ()=> copyText(caps[pt], copyBtn);
      plbl.appendChild(pname);
      plbl.appendChild(copyBtn);
      const box = document.createElement('div');
      box.className = 'caption-box';
      box.textContent = caps[pt];
      block.appendChild(plbl);
      block.appendChild(box);
      postPanel.appendChild(block);
    });
  } else {
    const empty = document.createElement('div');
    empty.className = 'empty-brief';
    empty.textContent = 'Captions coming soon.';
    postPanel.appendChild(empty);
  }

  body.appendChild(postPanel);
  card.appendChild(body);

  // Tab switching
  shootTabBtn.onclick = ()=>{
    shootTabBtn.classList.add('active'); postTabBtn.classList.remove('active');
    shootPanel.classList.add('active'); postPanel.classList.remove('active');
  };
  postTabBtn.onclick = ()=>{
    postTabBtn.classList.add('active'); shootTabBtn.classList.remove('active');
    postPanel.classList.add('active'); shootPanel.classList.remove('active');
  };

  return card;
}

// ─── TODAY PAGE ──────────────────────────────────────────────
function renderToday(){
  const page = document.getElementById('page-today');
  page.innerHTML = '';

  const dateLabel = document.createElement('div');
  dateLabel.className = 'section-label';
  dateLabel.textContent = getDayLabel(todayISO) + ' ' + getDayNum(todayISO) + ' ' + getMonthStr(todayISO) + ' — Today\'s briefs';
  page.appendChild(dateLabel);

  const todayBriefs = BRIEFS.filter(b=>b.date===todayISO);

  if(!todayBriefs.length){
    const msg = document.createElement('div');
    msg.className = 'empty-brief';
    msg.style.textAlign='center';
    msg.style.padding='40px 20px';
    msg.innerHTML = '<span class="empty-icon">✅</span>No briefs scheduled for today.<br>Check the Week tab for upcoming content.';
    page.appendChild(msg);
    return;
  }

  // KI first
  const ki = todayBriefs.find(b=>b.slot==='ki');
  if(ki){
    const sl = document.createElement('div');
    sl.className = 'section-label';
    sl.textContent = 'คุณครูอิ๊ฟ — TikTok · IG · YouTube Shorts';
    page.appendChild(sl);
    page.appendChild(buildCard(ki));
  }

  // Daisy second
  const daisy = todayBriefs.find(b=>b.slot==='daisy');
  if(daisy){
    const sl = document.createElement('div');
    sl.className = 'section-label';
    sl.textContent = 'Daisy International Nursery — TikTok · IG · YT · RED';
    page.appendChild(sl);
    page.appendChild(buildCard(daisy));
  }
}

// ─── WEEK PAGE ───────────────────────────────────────────────
let selectedDate = todayISO;

function renderWeek(){
  const page = document.getElementById('page-week');
  page.innerHTML = '';

  // Get unique dates
  const allDates = [...new Set(BRIEFS.map(b=>b.date))].sort();

  // Day strip
  const strip = document.createElement('div');
  strip.className = 'day-strip';

  allDates.forEach(d=>{
    const pill = document.createElement('div');
    pill.className = 'day-pill' + (d===selectedDate?' active':'') + (d===todayISO?' today':'');
    pill.dataset.date = d;

    const dayDiv = document.createElement('div');
    dayDiv.className = 'day-pill-day';
    dayDiv.textContent = getDayLabel(d).slice(0,3);
    pill.appendChild(dayDiv);

    const numDiv = document.createElement('div');
    numDiv.className = 'day-pill-num';
    numDiv.textContent = getDayNum(d);
    pill.appendChild(numDiv);

    // Dots
    const dots = document.createElement('div');
    dots.className = 'day-pill-dot';
    const kiItem = BRIEFS.find(b=>b.date===d&&b.slot==='ki');
    const daisyItem = BRIEFS.find(b=>b.date===d&&b.slot==='daisy');
    const kiDot = document.createElement('span');
    kiDot.className = 'dot ' + (kiItem ? 'ki' : 'empty');
    const daisyDot = document.createElement('span');
    daisyDot.className = 'dot ' + (daisyItem ? 'daisy' : 'empty');
    dots.appendChild(kiDot);
    dots.appendChild(daisyDot);
    pill.appendChild(dots);

    pill.onclick = ()=>{
      selectedDate = d;
      document.querySelectorAll('.day-pill').forEach(p=>p.classList.remove('active'));
      pill.classList.add('active');
      renderDayBriefs(d, dayContent);
    };
    strip.appendChild(pill);
  });
  page.appendChild(strip);

  // Day content area
  const dayContent = document.createElement('div');
  page.appendChild(dayContent);

  renderDayBriefs(selectedDate, dayContent);
}

function renderDayBriefs(dateISO, container){
  container.innerHTML = '';

  const dayBriefs = BRIEFS.filter(b=>b.date===dateISO);
  if(!dayBriefs.length){
    container.innerHTML = '<div class="empty-brief" style="text-align:center;padding:30px"><span class="empty-icon">📭</span>No content on this day.</div>';
    return;
  }

  const ki = dayBriefs.find(b=>b.slot==='ki');
  const daisy = dayBriefs.find(b=>b.slot==='daisy');

  if(ki){
    const sl = document.createElement('div');
    sl.className = 'section-label';
    sl.textContent = 'คุณครูอิ๊ฟ';
    container.appendChild(sl);
    container.appendChild(buildCard(ki));
  }
  if(daisy){
    const sl = document.createElement('div');
    sl.className = 'section-label';
    sl.textContent = 'Daisy International Nursery';
    container.appendChild(sl);
    container.appendChild(buildCard(daisy));
  }
}
