<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Daisy Curriculum — Team Dashboard</title>
<style>
:root {
  --teal: #1D9E75;
  --teal-light: #e8f7f2;
  --teal-mid: #b2e2d1;
  --amber: #E8A800;
  --amber-light: #fff8e1;
  --amber-mid: #fde68a;
  --green: #0F6E56;
  --bg: #f2f4f7;
  --card: #ffffff;
  --text: #1a1a2e;
  --muted: #6b7280;
  --border: #e5e7eb;
  --nav-h: 60px;
  --header-h: 64px;
  --roomA: #D85A30;
  --roomA-light: #fff0eb;
  --roomA-mid: #fbbf9a;
  --roomB: #1D9E75;
  --roomB-light: #e8f7f2;
  --roomB-mid: #6dd3b5;
  --radius: 12px;
  --shadow: 0 1px 4px rgba(0,0,0,0.08);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior:none}
#app-header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:var(--green);z-index:100;display:flex;align-items:center;padding:0 16px;gap:12px}
.header-logo{font-weight:800;font-size:18px;color:#fff;letter-spacing:-0.3px}
.header-logo span{color:var(--amber)}
.header-theme{font-size:13px;color:rgba(255,255,255,0.8);background:rgba(255,255,255,0.15);padding:3px 10px;border-radius:20px;white-space:nowrap}
.header-date{margin-left:auto;font-size:12px;color:rgba(255,255,255,0.7);white-space:nowrap}
main{padding-top:calc(var(--header-h) + 12px);padding-bottom:calc(var(--nav-h) + 12px);min-height:100vh}
.tab-pane{display:none;padding:0 12px}
.tab-pane.active{display:block}
nav#bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:#fff;border-top:1px solid var(--border);display:flex;z-index:100}
nav#bottom-nav button{flex:1;border:none;background:transparent;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:0;transition:color 0.15s}
nav#bottom-nav button .nav-icon{font-size:20px;line-height:1}
nav#bottom-nav button.active{color:var(--teal)}
nav#bottom-nav button.active .nav-icon{filter:drop-shadow(0 0 4px rgba(29,158,117,0.4))}

/* ===== SECTION LABELS ===== */
.section-label{font-size:11px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--muted);margin:16px 0 8px}

/* ===== WEEK BANNER ===== */
.week-banner{background:var(--green);color:#fff;border-radius:var(--radius);padding:14px 16px;margin-bottom:4px}
.week-banner .wk-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;opacity:0.7}
.week-banner .wk-theme{font-size:22px;font-weight:800;margin:2px 0 6px;letter-spacing:-0.3px}
.week-banner .eyfs-pills{display:flex;flex-wrap:wrap;gap:5px}
.week-banner .eyfs-pill{font-size:11px;background:rgba(255,255,255,0.2);color:#fff;padding:3px 8px;border-radius:20px;font-weight:600}

/* ===== SLOT CARDS ===== */
.slot-card{background:var(--card);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow)}
.slot-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
.slot-time{font-size:13px;font-weight:700;color:var(--teal);min-width:46px}
.slot-label{font-size:14px;font-weight:600;color:var(--text);flex:1}
.slot-eyfs-mini{font-size:11px;color:var(--muted);display:flex;gap:4px;flex-wrap:wrap}
.slot-chevron{font-size:16px;color:var(--muted);transition:transform 0.2s;margin-left:auto;flex-shrink:0}
.slot-card.open .slot-chevron{transform:rotate(180deg)}
.slot-body{display:none;padding:0 14px 14px}
.slot-card.open .slot-body{display:block}
.slot-note{font-size:12px;color:#8B4513;background:#fff8f0;border-left:3px solid var(--amber);padding:8px 10px;border-radius:0 6px 6px 0;margin-bottom:10px;font-weight:500}
.rooms-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:360px){.rooms-grid{grid-template-columns:1fr}}
.room-card{border-radius:10px;padding:10px 12px}
.room-card.roomA{background:var(--roomA-light);border:1.5px solid var(--roomA-mid)}
.room-card.roomB{background:var(--roomB-light);border:1.5px solid var(--roomB-mid)}
.room-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;margin-bottom:6px}
.room-badge.A{color:var(--roomA)}
.room-badge.B{color:var(--roomB)}
.room-badge::before{content:'';display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0}
.room-badge.A::before{background:var(--roomA)}
.room-badge.B::before{background:var(--roomB)}
.room-activity{font-size:13px;color:var(--text);line-height:1.4;margin-bottom:6px}
.room-vocab{font-size:11px;color:var(--muted)}
.room-vocab strong{color:var(--text)}
.room-materials{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.5}
.room-materials strong{color:var(--text);display:block;margin-bottom:2px}

/* Activity 2 highlight */
.slot-card.activity2 .slot-header{background:linear-gradient(90deg,#f0fdf9,#fff)}
.slot-card.activity2 .slot-time{color:var(--green)}
.slot-card.activity2 .slot-label::before{content:'⭐ ';font-size:12px}

/* Allergy warning */
.allergy-warning{background:#fef2f2;border:1.5px solid #fca5a5;border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:13px;color:#991b1b;font-weight:600;display:flex;align-items:center;gap:8px}

/* ===== WEEK TAB ===== */
.day-strip{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.day-strip::-webkit-scrollbar{display:none}
.day-pill{flex-shrink:0;padding:8px 14px;border-radius:30px;background:var(--card);border:1.5px solid var(--border);font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:all 0.15s;text-align:center;line-height:1.2}
.day-pill .dp-day{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.day-pill .dp-act{display:block;font-size:10px;margin-top:2px}
.day-pill.active{background:var(--teal);border-color:var(--teal);color:#fff}
.day-pill.today-marker{border-color:var(--amber);color:var(--amber)}
.day-pill.today-marker.active{background:var(--teal);color:#fff}
.day-brief-card{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);margin-bottom:8px}
.day-brief-card h3{font-size:16px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.act2-badge{font-size:12px;background:var(--teal-light);color:var(--green);padding:3px 8px;border-radius:20px;font-weight:700}
.mini-rooms{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.mini-room{border-radius:8px;padding:8px 10px;font-size:12px}
.mini-room.A{background:var(--roomA-light);border:1px solid var(--roomA-mid)}
.mini-room.B{background:var(--roomB-light);border:1px solid var(--roomB-mid)}
.mini-room-label{font-weight:700;font-size:11px;margin-bottom:3px}
.mini-room.A .mini-room-label{color:var(--roomA)}
.mini-room.B .mini-room-label{color:var(--roomB)}
.mini-room-text{color:var(--text);line-height:1.4}
.vocab-row{margin-top:8px;font-size:12px;color:var(--muted)}
.vocab-row strong{color:var(--text)}
.vocab-tag{display:inline-block;background:var(--bg);border-radius:4px;padding:2px 6px;margin:2px 3px 2px 0;font-size:11px;color:var(--text)}

/* ===== TERM TAB ===== */
.term-group-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin:16px 0 8px;padding-left:2px}
.week-card{background:var(--card);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);border-left:4px solid var(--border)}
.week-card.confirmed{border-left-color:var(--teal)}
.week-card.draft{border-left-color:var(--border)}
.week-card.current{border-left-color:var(--amber);background:#fffdf5}
.week-card.break-week{border-left-color:#ef4444;background:#fff5f5;opacity:0.8}
.week-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.week-dates{font-size:12px;color:var(--muted);font-weight:600}
.status-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;flex-shrink:0}
.status-badge.confirmed{background:var(--teal-light);color:var(--green)}
.status-badge.draft{background:#f3f4f6;color:var(--muted)}
.status-badge.current{background:var(--amber-light);color:#92400e}
.status-badge.break{background:#fee2e2;color:#991b1b}
.week-theme-name{font-size:15px;font-weight:700;margin:4px 0}
.week-eyfs-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.week-eyfs-tag{font-size:10px;background:var(--bg);color:var(--muted);padding:2px 7px;border-radius:10px;font-weight:600}
.week-holiday-note{font-size:11px;color:#dc2626;margin-top:6px;font-weight:500}
.week-notes-text{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.4}

/* ===== PREP TAB ===== */
.prep-section{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.prep-section h3{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.checklist{list-style:none}
.checklist li{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.4;cursor:pointer}
.checklist li:last-child{border-bottom:none}
.checklist li .cb{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.checklist li.done .cb{background:var(--teal);border-color:var(--teal);color:#fff}
.checklist li.done .cb::after{content:'✓';font-size:12px;font-weight:700}
.checklist li.done .cb-text{text-decoration:line-through;color:var(--muted)}
.cb-text{flex:1}
.cb-tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;flex-shrink:0;align-self:flex-start;margin-top:2px}
.cb-tag.A{background:var(--roomA-light);color:var(--roomA)}
.cb-tag.B{background:var(--roomB-light);color:var(--roomB)}
.cb-tag.both{background:var(--bg);color:var(--muted)}
.vocab-table{width:100%;border-collapse:collapse}
.vocab-table th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);padding:5px 8px;background:var(--bg);border-radius:6px}
.vocab-table td{font-size:12px;padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:top}
.vocab-table td:first-child{font-weight:600;color:var(--text);min-width:100px}
.vocab-table td:last-child{color:var(--muted)}
.eye-note{background:#fff8e1;border:1.5px solid var(--amber);border-radius:10px;padding:10px 12px;font-size:12px;color:#78350f;margin-bottom:10px;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.eye-note .icon{font-size:18px;flex-shrink:0}
</style>
</head>
<body>

<header id="app-header">
  <div class="header-logo">Daisy <span>Curriculum</span></div>
  <div class="header-theme" id="header-theme-label"></div>
  <div class="header-date" id="header-date-label"></div>
</header>

<main>
  <div id="tab-today" class="tab-pane"></div>
  <div id="tab-week" class="tab-pane"></div>
  <div id="tab-term" class="tab-pane"></div>
  <div id="tab-prep" class="tab-pane"></div>
</main>

<nav id="bottom-nav">

</nav>

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function getToday() {
  const now = new Date();
  const y = now.getFullYear(), m = String(now.getMonth()+1).padStart(2,'0'), d = String(now.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}
const TODAY = getToday();

function fmtDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}
function fmtWeekRange(start, end) {
  return fmtDate(start) + ' – ' + fmtDate(end);
}
function getDayName(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-GB',{weekday:'long'});
}

const CURRENT_WEEK = TERM_DATA.find(w => w.week_start <= TODAY && w.week_end >= TODAY) || TERM_DATA[0];

// ─── RENDER: WEEK ─────────────────────────────────────────────────────────────
let activeDay = TODAY;

function renderWeek() {
  const container = document.getElementById('tab-week');

  // Build day list for current week
  const days = [];
  const startDate = new Date(CURRENT_WEEK.week_start + 'T00:00:00');
  const ACT2 = ['Water Play','Sensory Play','Wiggle Wonder','Art & Craft','Cooking'];
  const ACT2_EMOJI = ['💧','🌿','🏃','🎨','🍓'];

  for (let i = 0; i < 5; i++) {
    const d = new Date(startDate);
    d.setDate(d.getDate() + i);
    const iso = d.toISOString().split('T')[0];
    days.push({ iso, dayName: ['Mon','Tue','Wed','Thu','Fri'][i], act2: ACT2[i], emoji: ACT2_EMOJI[i] });
  }

  let html = `<div class="week-banner">
    <div class="wk-label">${CURRENT_WEEK.term}</div>
    <div class="wk-theme">${CURRENT_WEEK.theme}</div>
    <div class="eyfs-pills">
      ${CURRENT_WEEK.eyfs_focus.map(e=>`<span class="eyfs-pill">${e}</span>`).join('')}
    </div>
  </div>`;

  html += `<div class="day-strip" id="day-strip">`;
  days.forEach(day => {
    const isToday = day.iso === TODAY;
    const isActive = day.iso === activeDay;
    html += `<div class="day-pill${isActive?' active':''}${isToday&&!isActive?' today-marker':''}" onclick="selectDay('${day.iso}')">
      <span class="dp-day">${day.dayName}</span>
      <span class="dp-act">${day.emoji}</span>
    </div>`;
  });
  html += `</div><div id="day-brief-area"></div>`;

  container.innerHTML = html;
  renderDayBrief(activeDay);
}

function selectDay(iso) {
  activeDay = iso;
  document.querySelectorAll('.day-pill').forEach((p,i) => {
    const days = [];
    const startDate = new Date(CURRENT_WEEK.week_start + 'T00:00:00');
    for (let j=0;j<5;j++){const d=new Date(startDate);d.setDate(d.getDate()+j);days.push(d.toISOString().split('T')[0]);}
    p.classList.toggle('active', days[i] === iso);
  });
  renderDayBrief(iso);
}

  const area = document.getElementById('day-brief-area');

  const day = DAYS_DATA[iso];

  const dayIdx = d.getDay() - 1; // Mon=0

        </div>
      </div>
    </div>`;

    if (day.stem_project) {
      html += `<div class="day-brief-card">
        <h3>🔬 13:00 — ${day.stem_project.label}</h3>

    if (allMats.length) {
      html += `<div class="day-brief-card">
        <h3>🧰 Materials for Today</h3>
        <ul class="checklist" id="day-mats">`;

}

function togglePrep(i) {
  document.getElementById('prep-'+i)?.classList.toggle('done');
}

// ─── TAB SWITCHING ────────────────────────────────────────────────────────────
const TABS = ['today','week','term','prep'];
function switchTab(tab) {
  TABS.forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    const btn = document.getElementById('nav-'+t);
    if (btn) btn.classList.toggle('active', t===tab);
  });
  window.scrollTo(0,0);
}

// ─── HEADER ───────────────────────────────────────────────────────────────────
function initHeader() {
  document.getElementById('header-theme-label').textContent = CURRENT_WEEK.theme;
  const dayName = getDayName(TODAY);
  const shortDay = dayName.slice(0,3);
  const d = new Date(TODAY + 'T00:00:00');
  const dd = d.getDate(), mo = d.toLocaleDateString('en-GB',{month:'short'});
  document.getElementById('header-date-label').textContent = `${shortDay} ${dd} ${mo}`;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
initHeader();
renderToday();
renderWeek();
renderTerm();
renderPrep();
switchTab('today');
</script>
</body>
</html>
